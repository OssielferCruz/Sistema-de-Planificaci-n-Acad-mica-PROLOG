<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planificador Academico ICE</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <h1>Planificador Academico ICE</h1>
      <p>Interfaz web del sistema experto. XPCE sigue disponible como opcion alternativa.</p>
    </header>

    <section class="grid two">
      <article class="panel">
        <h2>Catalogo de materias</h2>
        <input id="filtro" type="text" placeholder="Buscar por codigo o nombre" />
        <select id="catalogo" size="16"></select>
        <div class="actions">
          <button id="btnVerificar">Verificar requisitos</button>
          <button id="btnRuta">Ruta critica</button>
          <button id="btnRecomendar">Recomendar recuperacion</button>
          <button id="btnMarcar">Marcar aprobada</button>
        </div>
      </article>

      <article class="panel">
        <h2>Expediente</h2>
        <select id="expediente" size="16"></select>
        <div class="actions">
          <button id="btnQuitar">Quitar aprobada</button>
          <button id="btnSimular">Simular matricula</button>
          <button id="btnProgreso">Ver progreso</button>
        </div>
        <div class="persist">
          <input id="archivo" type="text" placeholder="expediente_ice.pl" />
          <button id="btnGuardar">Guardar</button>
          <button id="btnCargar">Cargar</button>
        </div>
      </article>
    </section>

    <section class="panel">
      <h2>Resultado</h2>
      <pre id="resultado">Cargando informacion inicial...</pre>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
